<?xml version="1.0" encoding="UTF-8"?>
<!-- Mockup SVG: chat app on a phone connected to an OpenCode server with an animated dotted flow line -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" role="img" aria-labelledby="title desc">
  <title id="title">OpenCode Mobile mockup</title>
  <desc id="desc">A stylized phone with a chat interface on the left connected to an OpenCode server stack on the right by an animated dotted line showing flow.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#f6fbff" />
      <stop offset="1" stop-color="#f3f7fa" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0f1724" flood-opacity="0.08"/>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- background subtle -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Phone mockup (left) -->
  <g transform="translate(100,80)">
    <rect x="0" y="0" width="360" height="560" rx="28" fill="#0b1220" filter="url(#shadow)" />
    <rect x="8" y="8" width="344" height="544" rx="20" fill="#ffffff" />

    <!-- speaker notch -->
    <rect x="152" y="12" width="56" height="6" rx="3" fill="#e6eef7" opacity="0.9" />

    <!-- Chat header -->
    <rect x="16" y="26" width="312" height="36" rx="8" fill="#f6f9fb" />
    <text x="34" y="50" font-family="Inter, Arial, sans-serif" font-size="14" fill="#123" >OpenCode Chat</text>

    <!-- Chat bubbles -->
    <g transform="translate(16,80)">
      <rect x="0" y="0" width="260" height="52" rx="12" fill="#eef6ff" />
      <text x="14" y="32" font-family="Inter, Arial, sans-serif" font-size="13" fill="#0b2540">Agent: Built and pushed changes to branch feature/x</text>

      <rect x="72" y="80" width="232" height="46" rx="12" fill="#f1f5f9" />
      <text x="86" y="108" font-family="Inter, Arial, sans-serif" font-size="13" fill="#0b2540">You: Review and merge when green</text>

      <rect x="0" y="150" width="200" height="46" rx="12" fill="#eef6ff" />
      <text x="14" y="178" font-family="Inter, Arial, sans-serif" font-size="13" fill="#0b2540">Agent: Tests passing; deploying preview</text>

      <!-- input area -->
      <rect x="0" y="240" width="328" height="46" rx="10" fill="#f6f9fb" />
      <text x="12" y="270" font-family="Inter, Arial, sans-serif" font-size="13" fill="#7b8b95">Type a message…</text>
    </g>
  </g>

  <!-- Server stack (right) -->
  <g transform="translate(820,150)">
    <rect x="0" y="0" width="240" height="160" rx="12" fill="#0b1220" filter="url(#shadow)" />
    <rect x="10" y="10" width="220" height="140" rx="8" fill="#fff" />

    <!-- server layers -->
    <rect x="24" y="28" width="192" height="28" rx="6" fill="#eaf2ff" />
    <rect x="24" y="66" width="192" height="28" rx="6" fill="#f5f7fa" />
    <rect x="24" y="104" width="192" height="28" rx="6" fill="#eef6ff" />

    <text x="36" y="46" font-family="Inter, Arial, sans-serif" font-size="13" fill="#112">OpenCode Server</text>
    <text x="36" y="84" font-family="Inter, Arial, sans-serif" font-size="12" fill="#556">Workspace: /repo/main</text>
    <text x="36" y="122" font-family="Inter, Arial, sans-serif" font-size="12" fill="#556">Agents: 3 active</text>
  </g>

  <!-- Flow path between phone and server -->
  <path id="flowPath" d="M460 320 C 540 240, 720 240, 820 220" fill="none" stroke="#1d4ed8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6 10" opacity="0.95" />

  <!-- Animated dashed offset to imply flow -->
  <animate xlink:href="#flowPath" attributeName="stroke-dashoffset" from="0" to="-100" dur="3s" repeatCount="indefinite" />

  <!-- moving dot along same path to show direction -->
  <g>
    <circle r="6" fill="#1d4ed8">
      <animateMotion dur="2.2s" repeatCount="indefinite">
        <mpath xlink:href="#flowPath" />
      </animateMotion>
    </circle>
    <!-- a faint trailing glow -->
    <circle r="10" fill="#93c5fd" opacity="0.08">
      <animateMotion dur="2.2s" repeatCount="indefinite">
        <mpath xlink:href="#flowPath" />
      </animateMotion>
    </circle>
  </g>

  <!-- subtle labels to clarify the flow -->
  <text x="500" y="260" font-family="Inter, Arial, sans-serif" font-size="12" fill="#254">Sync</text>
  <text x="700" y="220" font-family="Inter, Arial, sans-serif" font-size="12" fill="#254">Commands & updates</text>

  <!-- Border/frame to keep composition tight -->
  <rect x="40" y="40" width="1120" height="620" rx="22" fill="none" stroke="#e6eef7" stroke-width="1" />
</svg>
